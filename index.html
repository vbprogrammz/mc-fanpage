<!DOCTYPE html> 
<html>
  <head>
    <title>Minecraft - The fan page!</title>
  </head>
  <style>
    #title { 
      font-family: Monospace;
      text-align: center;
      color: black;
      border: 2px solid black;
      padding: 10px; /* Adds space between text and border */
      display: inline-block; /* Makes the box only as wide as the text */
      border-radius: 15px;
    }
    
    body {
      background: #2A7B9B;
      background: linear-gradient(90deg,rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
      font-family: Monospace;
      padding: 2px;
    }
    
    footer {
      font-family: Monospace;
    }
    
  .iframe-container {
    display: flex;
    gap: 20px; /* space between iframes */
    justify-content: center; /* center them horizontally */
    flex-wrap: wrap; /* wrap to next line on small screens */
    padding: 10px;
  }

  .iframe-container iframe {
    border: 3px solid black;
    border-radius: 10px;
  }
  
  .main_about: p {
    font-family: Monospace;
    display: flex;
  }
  
  .main_about: h2 {
    font-family: Monospace;
  }
  
  .main_about { 
    border: 3px solid black;
    border-radius: 15px;
    padding: 5px;
  }

.retro-nav ul {
  list-style: none;
  display: flex;
  gap: 1.5rem;
  margin: 0;
  padding: 0;
}

.retro-nav a {
  text-decoration: none;
  color: black; /* FIXED */
  font-weight: bold;
  padding: 0.5rem 1rem;
  background-color: white;
  border: 2px solid green;
  transition: all 0.2s;
  text-transform: uppercase;
}

/* Retro Hover Effect */
.retro-nav a:hover {
  background-color: white;
  color: #000;
  border-color: #000;
  transform: translate(-2px, -2px);
  box-shadow: 3px 3px 0 green;
}

body {
  font-family: 'Courier New', Courier, monospace;
  background-color: green;
}

.retro-nav {
  background-color: white; 
  color: black; 
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 4px solid green; 
  box-shadow: 0 4px 0 #000;
}
.retro-nav .logo {
  font-size: 1.8rem;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 green;
}
    
  </style>
